<div class="lateral-panel">
  <div class="logo-section">
    <div class="company-logo">
      <svg viewBox="0 0 100 100" class="logo">
        <circle cx="50" cy="50" r="45" fill="#4CAF50"/>
        <text x="50" y="60" text-anchor="middle" fill="white" font-family="Arial" font-size="20" font-weight="bold">AC</text>
      </svg>
      <span class="company-name">Cinlat Logistic</span>
    </div>
  </div>
  
  <nav class="navigation">
    @for (tab of filteredTabs; track tab.id) {
      <button 
        class="nav-item" 
        [class.active]="activeTab() === tab.id"
        (click)="setActiveTab(tab.id)"
        type="button"
        routerLink="{{ tab.id }}">
        <span class="nav-icon">{{ tab.icon }}</span>
        <span class="nav-label">{{ tab.label }}</span>
      </button>
    }
  </nav>
</div>
