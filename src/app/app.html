




<style>
  :host {
    --bright-blue: oklch(51.01% 0.274 263.83);
    --electric-violet: oklch(53.18% 0.28 296.97);
    --french-violet: oklch(47.66% 0.246 305.88);
    --vivid-pink: oklch(69.02% 0.277 332.77);
    --hot-red: oklch(61.42% 0.238 15.34);
    --orange-red: oklch(63.32% 0.24 31.68);

    --gray-900: oklch(19.37% 0.006 300.98);
    --gray-700: oklch(36.98% 0.014 302.71);
    --gray-400: oklch(70.9% 0.015 304.04);

    --red-to-pink-to-purple-vertical-gradient: linear-gradient(
      180deg,
      var(--orange-red) 0%,
      var(--vivid-pink) 50%,
      var(--electric-violet) 100%
    );

    --red-to-pink-to-purple-horizontal-gradient: linear-gradient(
      90deg,
      var(--orange-red) 0%,
      var(--vivid-pink) 50%,
      var(--electric-violet) 100%
    );

    --pill-accent: var(--bright-blue);

    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji",
      "Segoe UI Symbol";
    box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  h1 {
    font-size: 3.125rem;
    color: var(--gray-900);
    font-weight: 500;
    line-height: 100%;
    letter-spacing: -0.125rem;
    margin: 0;
    font-family: "Inter Tight", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji",
      "Segoe UI Symbol";
  }

  p {
    margin: 0;
    color: var(--gray-700);
  }

  .main-content {
    margin-left: 280px;
    width: calc(100% - 280px);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 2rem;
    box-sizing: border-box;
    position: relative;
    background: #f5f7fa;
    transition: margin-top 0.3s ease;
  }
  
  .main-content.with-dashboard {
    margin-top: 80px;
  }

  .content-section {
    text-align: center;
    background: white;
    padding: 3rem;
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    border: 1px solid #e1e8ed;
  }
  
  .content-section h1 {
    color: var(--gray-900);
    margin-bottom: 1rem;
  }
  
  .content-section p {
    color: var(--gray-700);
    font-size: 1.125rem;
  }
  
  .tab-info {
    margin-top: 1.5rem;
    padding: 1rem;
    background: #f1f5f9;
    border-radius: 8px;
    border-left: 4px solid #3858e6;
  }

  @media screen and (max-width: 768px) {
    .main-content {
      margin-left: 240px;
      width: calc(100% - 240px);
      padding: 1.5rem;
    }
    
    .content-section {
      padding: 2rem;
    }
  }

  @media screen and (max-width: 480px) {
    .main-content {
      margin-left: 64px;
      width: calc(100% - 64px);
      padding: 1rem;
    }
    
    .content-section {
      padding: 1.5rem;
    }
    
    .content-section h1 {
      font-size: 2rem;
    }
  }
</style>


@if (logging) {
  <app-lateral-panel (tabChange)="onTabChange($event)"></app-lateral-panel>

  <app-dashboard [isVisible]="true" (logoutClick)="logout()"></app-dashboard>

  <div class="main-content" [class.with-dashboard]="activeTab() === 'home'">
      <router-outlet />
  </div>

} @else {
  <app-login />
}

<app-footer></app-footer>
