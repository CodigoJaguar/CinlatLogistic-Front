<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1 class="login-title">Iniciar Sesión</h1>
      <p class="login-subtitle">Accede a tu cuenta</p>
    </div>
    
    <form [formGroup]="loginForm"  class="login-form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email" class="form-label">Email</label>
        <input 
          type="email" 
          id="email" 
          name="email"
          class="form-input"
          placeholder="Ingresa tu email"
          formControlName="Email"
          required
        />
      </div>
      
      <div class="form-group">
        <label for="password" class="form-label">Contraseña</label>
        <div class="password-input-wrapper">
          <input 

            id="password" 
            name="password"
            class="form-input"
            placeholder="Ingresa tu contraseña"
            formControlName="Password"
            required
          />
          <!-- <button 
            type="button" 
            class="password-toggle"
            (click)="togglePasswordVisibility()"
          >
            <i [class]="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
          </button> -->
        </div>
      </div>
      
      <div class="form-options">
        <label class="checkbox-wrapper">
          <input type="checkbox"  name="rememberMe">
          <span class="checkmark"></span>
          Recordarme
        </label>
        <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
      </div>
      
      <button type="submit" class="login-button" [disabled]="!isFormValid()">
        @if(!isLoading()){
          <span>Iniciar Sesión</span>
        }@else {
          <span class="loading-spinner"></span>
        }
        
      </button>
      
      <div class="divider">
        <span>o</span>
      </div>
      
      <div class="social-login">
        <button type="button" class="social-button google-button">
          <i class="fab fa-google"></i>
          Continuar con Google
        </button>
        <button type="button" class="social-button microsoft-button">
          <i class="fab fa-microsoft"></i>
          Continuar con Microsoft
        </button>
      </div>
      
      <div class="signup-link">
        <p>¿No tienes una cuenta? <a routerLink="/register">Regístrate aquí</a></p>
      </div>
    </form>
  </div>
</div>
